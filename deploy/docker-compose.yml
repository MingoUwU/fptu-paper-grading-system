x-api-environment: &api-environment
  ASPNETCORE_URLS: http://+:8080
  ASPNETCORE_ENVIRONMENT: Production
  ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=PaperGardingSystem;User Id=sa;Password=${MSSQL_SA_PASSWORD};TrustServerCertificate=True"
  RabbitMq__Host: rabbitmq
  RabbitMq__VirtualHost: /
  RabbitMq__Username: ${RABBITMQ_DEFAULT_USER}
  RabbitMq__Password: ${RABBITMQ_DEFAULT_PASS}
  Storage__Endpoint: http://minio:9000
  Storage__AccessKey: ${MINIO_ROOT_USER}
  Storage__SecretKey: ${MINIO_ROOT_PASSWORD}

services:
  api-gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/ApiGateway/Fptu.Pgs.ApiGateway/Fptu.Pgs.ApiGateway.csproj
        ASSEMBLY_NAME: Fptu.Pgs.ApiGateway
    environment:
      ASPNETCORE_URLS: http://+:8080
    ports:
      - "5000:8080"
    depends_on:
      - identity-api
      - exam-api
      - submission-api
      - document-processing-api
      - ai-grading-api
      - review-score-api
      - report-audit-api
      - job-status-api

  identity-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/Identity/Fptu.Pgs.Identity.Api/Fptu.Pgs.Identity.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.Identity.Api
    environment:
      <<: *api-environment
      Jwt__SigningKey: DevelopmentOnly_ReplaceWithASecretManager
    depends_on:
      - sqlserver

  exam-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/Exam/Fptu.Pgs.Exam.Api/Fptu.Pgs.Exam.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.Exam.Api
    environment:
      <<: *api-environment
    depends_on:
      - sqlserver

  submission-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/Submission/Fptu.Pgs.Submission.Api/Fptu.Pgs.Submission.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.Submission.Api
    environment:
      <<: *api-environment
      Storage__Provider: MinIO
    depends_on:
      - sqlserver
      - rabbitmq
      - minio

  document-processing-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/DocumentProcessing/Fptu.Pgs.DocumentProcessing.Api/Fptu.Pgs.DocumentProcessing.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.DocumentProcessing.Api
    environment:
      <<: *api-environment
      Storage__Provider: MinIO
    depends_on:
      - sqlserver
      - rabbitmq
      - minio

  ai-grading-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/AiGrading/Fptu.Pgs.AiGrading.Api/Fptu.Pgs.AiGrading.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.AiGrading.Api
    environment:
      <<: *api-environment
      AiProvider__Provider: ${AI_PROVIDER:-Mock}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      GOOGLE_API_KEYS: ${GOOGLE_API_KEYS}
      Services__ReviewScoreBaseUrl: http://review-score-api:8080/
      Services__ExamBaseUrl: http://exam-api:8080/
      DataProtection__KeyRingPath: /app/.keys
    volumes:
      - ai-grading-keys:/app/.keys
    depends_on:
      - sqlserver
      - rabbitmq
      - exam-api

  review-score-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/ReviewScore/Fptu.Pgs.ReviewScore.Api/Fptu.Pgs.ReviewScore.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.ReviewScore.Api
    environment:
      <<: *api-environment
    depends_on:
      - sqlserver
      - rabbitmq

  report-audit-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/ReportAudit/Fptu.Pgs.ReportAudit.Api/Fptu.Pgs.ReportAudit.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.ReportAudit.Api
    environment:
      <<: *api-environment
    depends_on:
      - sqlserver
      - rabbitmq

  job-status-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.service
      args:
        PROJECT_PATH: src/Services/JobStatus/Fptu.Pgs.JobStatus.Api/Fptu.Pgs.JobStatus.Api.csproj
        ASSEMBLY_NAME: Fptu.Pgs.JobStatus.Api
    environment:
      <<: *api-environment
    depends_on:
      - sqlserver
      - rabbitmq

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  sqlserver-data:
  rabbitmq-data:
  minio-data:
  ai-grading-keys:
